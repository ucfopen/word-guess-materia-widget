name: Lint and Format

on:
  push:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
      - name: Check formatting
        run: yarn format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
      - name: Run linter
        run: yarn lint:check
