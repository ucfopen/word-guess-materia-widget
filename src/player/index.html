<!doctype html>
<html lang="en">
  <head>
    <title>Word Guess Player</title>
    <meta charset="utf-8" />

    <link
      href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Montserrat:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="player.css" />
    <script src="materia.enginecore.js"></script>
    <script src="player.js" defer></script>
  </head>

  <body>
    <main>
      <div class="logo-container">
        <img src="/assets/Icon.png" alt="Game logo" class="logo" />
      </div>

      <section class="word-bank-container">
        <h2>Word Bank</h2>

        <div class="word-bank" id="word-bank"></div>
        <button id="submit-button" class="action-btn">Submit</button>
      </section>

      <section class="passage">
        <h2 id="title"></h2>

        <div id="passage"></div>
      </section>
    </main>
  </body>
</html>
